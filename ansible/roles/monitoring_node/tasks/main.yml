---
# Monitoring Node Tasks
# This role sets up Prometheus and Grafana for cluster monitoring

- name: Install monitoring tools
  apt:
    name:
      - prometheus
      - grafana-server
    state: latest
    update_cache: yes
  become: true

- name: Start monitoring services
  systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
  become: yes
  loop:
    - prometheus
    - grafana-server

